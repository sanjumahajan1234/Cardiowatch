<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CardioWatch{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <i class="fas fa-heartbeat"></i> CardioWatch
            </a>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link"><i class="fas fa-th-large"></i> <span>Dashboard</span></a></li>
                <li><a href="/analytics" class="nav-link"><i class="fas fa-chart-bar"></i> <span>Analytics</span></a></li>
                <li><a href="/fhir-status" class="nav-link"><i class="fas fa-server"></i> <span>FHIR Status</span></a></li>
                <li><a href="/privacy" class="nav-link"><i class="fas fa-shield-alt"></i> <span>Privacy</span></a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
